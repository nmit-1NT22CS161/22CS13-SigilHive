name: SigilHive — Build & Deploy to GKE

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:          # allow manual trigger from GitHub UI

# ── Global env vars used across all jobs ─────────────────────────────────────
env:
  PROJECT_ID:  ${{ secrets.GCP_PROJECT_ID }}
  CLUSTER:     ${{ vars.GKE_CLUSTER || 'sigilhive-cluster' }}
  ZONE:        ${{ vars.GKE_ZONE || 'asia-south1-a' }}
  REGION:      ${{ vars.GKE_REGION || 'asia-south1' }}
  REGISTRY:    asia-south1-docker.pkg.dev
  AR_REPO:     sigilhive          # Artifact Registry repository name
  NAMESPACE:   sigilhive

# ─────────────────────────────────────────────────────────────────────────────
jobs:

  # ── 1. LINT ─────────────────────────────────────────────────────────────────
  lint:
    name: Lint Kubernetes Manifests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate k8s manifests (dry-run)
        run: |
          find k8s -name "*.yaml" | while read f; do
            echo "Validating: $f"
            # Replace placeholders so kubectl can parse the YAML
            sed 's|IMAGE_TAG|dryrun|g; s|IMAGE_REGISTRY|example.com/repo|g' "$f" \
              | kubectl apply --dry-run=client -f - 2>&1 || true
          done

  # ── 2. BUILD & PUSH ─────────────────────────────────────────────────────────
  build:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: lint
    # Only push images on real commits, not on PR checks
    if: github.event_name != 'pull_request'

    permissions:
      contents: read
      id-token: write     # Required for Workload Identity Federation

    outputs:
      image_tag: ${{ steps.tag.outputs.sha }}

    steps:
      - uses: actions/checkout@v4

      # Keyless GCP auth — no JSON key stored in GitHub
      - name: Authenticate to Google Cloud (WIF)
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account:            ${{ secrets.WIF_SERVICE_ACCOUNT }}
          token_format:               access_token
          project_id:                 ${{ secrets.GCP_PROJECT_ID }}

      - name: Set up gcloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Login to Artifact Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      # Use first 8 chars of commit SHA as the image tag
      - name: Compute image tag
        id: tag
        run: echo "sha=${GITHUB_SHA::8}" >> "$GITHUB_OUTPUT"

      # ── Docker build helper — reuse across all images ─────────────────────
      # Real repo layout:
      #   22CS13-SigilHive/
      #     SigilHive/               ← monorepo root (shared files live here)
      #       ssh_server/Dockerfile
      #       http/Dockerfile
      #       database/Dockerfile
      #       grafana_connector/Dockerfile
      #       metrics_collector/Dockerfile
      #       Dockerfile               ← sequential_attacker
      #       kafka_manager.py         ← shared
      #       file_structure.py        ← shared
      #       rl_core/                 ← shared
      # ─────────────────────────────────────────────────────────────────────

      - name: Build & push — ssh_honeypot
        uses: docker/build-push-action@v5
        with:
          # Build context = SigilHive/ so shared files (kafka_manager.py, etc.) are in scope
          context: SigilHive
          file:    SigilHive/ssh_server/Dockerfile
          push:    true
          tags: |
            ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.AR_REPO }}/ssh_honeypot:${{ steps.tag.outputs.sha }}
            ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.AR_REPO }}/ssh_honeypot:latest

      - name: Build & push — http_honeypot
        uses: docker/build-push-action@v5
        with:
          context: SigilHive
          file:    SigilHive/http/Dockerfile
          push:    true
          tags: |
            ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.AR_REPO }}/http_honeypot:${{ steps.tag.outputs.sha }}
            ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.AR_REPO }}/http_honeypot:latest

      - name: Build & push — db_honeypot
        uses: docker/build-push-action@v5
        with:
          context: SigilHive
          file:    SigilHive/database/Dockerfile
          push:    true
          tags: |
            ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.AR_REPO }}/db_honeypot:${{ steps.tag.outputs.sha }}
            ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.AR_REPO }}/db_honeypot:latest

      - name: Build & push — grafana_connector
        uses: docker/build-push-action@v5
        with:
          context: SigilHive/grafana_connector
          file:    SigilHive/grafana_connector/Dockerfile
          push:    true
          tags: |
            ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.AR_REPO }}/grafana_connector:${{ steps.tag.outputs.sha }}
            ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.AR_REPO }}/grafana_connector:latest

      - name: Build & push — metrics_collector
        uses: docker/build-push-action@v5
        with:
          context: SigilHive/metrics_collector
          file:    SigilHive/metrics_collector/Dockerfile
          push:    true
          tags: |
            ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.AR_REPO }}/metrics_collector:${{ steps.tag.outputs.sha }}
            ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.AR_REPO }}/metrics_collector:latest

      - name: Build & push — sequential_attacker
        uses: docker/build-push-action@v5
        with:
          context: SigilHive
          file:    SigilHive/Dockerfile
          push:    true
          tags: |
            ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.AR_REPO }}/sequential_attacker:${{ steps.tag.outputs.sha }}
            ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.AR_REPO }}/sequential_attacker:latest

  # ── 3. DEPLOY ───────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to GKE
    runs-on: ubuntu-latest
    needs: build
    # Only deploy on pushes to main, never on PRs
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account:            ${{ secrets.WIF_SERVICE_ACCOUNT }}
          project_id:                 ${{ secrets.GCP_PROJECT_ID }}

      - name: Set up gcloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Verify target GKE cluster exists
        run: |
          set -e
          test -n "${PROJECT_ID}" || (echo "GCP_PROJECT_ID secret is empty" && exit 1)
          echo "Looking for GKE cluster '${CLUSTER}' in project '${PROJECT_ID}', location '${REGION}'..."
          gcloud container clusters list \
            --project="${PROJECT_ID}" \
            --filter="name=${CLUSTER}" \
            --format="table(name,location,status,currentMasterVersion)"

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          project_id:   ${{ env.PROJECT_ID }}
          cluster_name: ${{ env.CLUSTER }}
          location:     ${{ env.REGION }}

      # Replace IMAGE_TAG and IMAGE_REGISTRY placeholders in all manifests
      - name: Inject image tag into manifests
        run: |
          TAG=${{ needs.build.outputs.image_tag }}
          REGISTRY=${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.AR_REPO }}
          find k8s -name "*.yaml" -exec sed -i \
            "s|IMAGE_TAG|${TAG}|g; s|IMAGE_REGISTRY|${REGISTRY}|g" {} +
          echo "Manifests updated with tag: ${TAG}"

      - name: Apply namespace
        run: kubectl apply -f k8s/base/namespace.yaml

      - name: Deploy Kafka
        run: |
          kubectl delete job kafka-create-topics -n ${{ env.NAMESPACE }} --ignore-not-found
          kubectl apply -f k8s/kafka/ -n ${{ env.NAMESPACE }}

      - name: Restart Kafka StatefulSet
        run: kubectl rollout restart statefulset/kafka -n ${{ env.NAMESPACE }}

      - name: Wait for Kafka to be Ready
        run: |
          set -e
          if ! kubectl rollout status statefulset/kafka \
            -n ${{ env.NAMESPACE }} --timeout=600s; then
            echo "Kafka rollout failed. Collecting diagnostics..."
            kubectl get statefulset,pods,pvc -n ${{ env.NAMESPACE }} -l app=kafka -o wide || true
            kubectl describe statefulset kafka -n ${{ env.NAMESPACE }} || true
            kubectl describe pod kafka-0 -n ${{ env.NAMESPACE }} || true
            kubectl logs kafka-0 -n ${{ env.NAMESPACE }} -c kafka --tail=200 || true
            kubectl logs kafka-0 -n ${{ env.NAMESPACE }} -c fix-permissions --tail=200 || true
            kubectl get events -n ${{ env.NAMESPACE }} --sort-by=.lastTimestamp | tail -n 50 || true
            exit 1
          fi

      - name: Wait for Kafka topics
        run: |
          set -e
          if ! kubectl wait --for=condition=complete job/kafka-create-topics \
            -n ${{ env.NAMESPACE }} --timeout=300s; then
            echo "Kafka topic bootstrap failed. Collecting diagnostics..."
            kubectl describe job kafka-create-topics -n ${{ env.NAMESPACE }} || true
            kubectl logs job/kafka-create-topics -n ${{ env.NAMESPACE }} --tail=200 || true
            kubectl get events -n ${{ env.NAMESPACE }} --sort-by=.lastTimestamp | tail -n 50 || true
            exit 1
          fi

      - name: Deploy Honeypots
        run: |
          kubectl delete job sequential-attacker -n ${{ env.NAMESPACE }} --ignore-not-found
          kubectl apply -f k8s/honeypots/ -n ${{ env.NAMESPACE }}

      - name: Deploy Monitoring
        run: kubectl apply -f k8s/monitoring/ -n ${{ env.NAMESPACE }}

      - name: Restart application Deployments
        run: |
          kubectl rollout restart deployment/ssh-honeypot -n ${{ env.NAMESPACE }}
          kubectl rollout restart deployment/http-honeypot -n ${{ env.NAMESPACE }}
          kubectl rollout restart deployment/db-honeypot -n ${{ env.NAMESPACE }}
          kubectl rollout restart deployment/grafana-connector -n ${{ env.NAMESPACE }}
          kubectl rollout restart deployment/metrics-collector -n ${{ env.NAMESPACE }}

      - name: Wait for all Deployments
        run: |
          set -e
          for dep in ssh-honeypot http-honeypot db-honeypot \
                     grafana-connector metrics-collector; do
            echo "Waiting for: $dep"
            if ! kubectl rollout status deployment/${dep} \
              -n ${{ env.NAMESPACE }} --timeout=300s; then
              echo "Deployment rollout failed for ${dep}. Collecting diagnostics..."
              kubectl get deployment/${dep} -n ${{ env.NAMESPACE }} -o wide || true
              kubectl describe deployment/${dep} -n ${{ env.NAMESPACE }} || true
              kubectl get pods -n ${{ env.NAMESPACE }} -l app=${dep} -o wide || true
              kubectl describe pods -n ${{ env.NAMESPACE }} -l app=${dep} || true
              kubectl logs -n ${{ env.NAMESPACE }} -l app=${dep} --all-containers=true --tail=200 || true
              kubectl get events -n ${{ env.NAMESPACE }} --sort-by=.lastTimestamp | tail -n 50 || true
              exit 1
            fi
          done

      - name: Print external LoadBalancer IPs
        run: |
          echo ""
          echo "════════════════════════════════════════"
          echo "  SigilHive Honeypot External Endpoints"
          echo "════════════════════════════════════════"
          kubectl get svc -n ${{ env.NAMESPACE }} --field-selector spec.type=LoadBalancer -o wide
          echo "════════════════════════════════════════"
